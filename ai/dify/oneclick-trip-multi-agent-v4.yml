    - data:
        code: "import hashlib\nimport json\nimport time\n\ndef calculate_hash(draft):\n    material={\n        'plan_id':draft.get('plan_id'),'plan_version':draft.get('plan_version'),\n\
          \        'quote_ids':sorted(draft.get('quote_ids') or []),'total_price':draft.get('total_price'),\n        'expires_at':draft.get('expires_at'),'selected_option_ids':sorted(draft.get('selected_option_ids')\
          \ or [])\n    }\n    canonical=json.dumps(material,ensure_ascii=False,sort_keys=True,separators=(',',':'))\n   \
          \ return hashlib.sha256(canonical.encode('utf-8')).hexdigest()\n\ndef main(query: str, conversation_id: str, user_id:\
          \ str, persisted_draft_json: str, current_plan_json: str) -> dict:\n    try: draft=json.loads(persisted_draft_json\
          \ or '{}')\n    except Exception: draft={}\n    try: plan=json.loads(current_plan_json or '{}')\n    except Exception:\
          \ plan={}\n    error=''\n    if not draft.get('draft_id'): error='NO_PENDING_DRAFT'\n    elif draft.get('creator_user_id')\
          \ != user_id: error='DRAFT_USER_MISMATCH'\n    elif draft.get('thread_id') != conversation_id: error='DRAFT_THREAD_MISMATCH'\n\
          \    elif draft.get('status') != 'PENDING_CONFIRMATION': error='DRAFT_NOT_CONFIRMABLE'\n    elif int(draft.get('expires_at')\
          \ or 0) < int(time.time()): error='DRAFT_EXPIRED'\n    elif draft.get('plan_id') != plan.get('plan_id') or draft.get('plan_version')\
          \ != plan.get('plan_version'): error='DRAFT_PLAN_VERSION_MISMATCH'\n    elif calculate_hash(draft) != draft.get('draft_hash'):\
          \ error='DRAFT_HASH_MISMATCH'\n    elif not any(word in (query or '') for word in ['确认提交','确认下单','确认预订','确认购买']):\
          \ error='EXPLICIT_CONFIRMATION_REQUIRED'\n    elif str(draft.get('draft_id')) not in (query or ''): error='DRAFT_ID_REQUIRED'\n\
          \    elif str(draft.get('confirmation_token')) not in (query or ''): error='CONFIRMATION_TOKEN_MISMATCH'\n    return\
          \ {\n        'can_submit':'true' if not error else 'false','validation_error':error,\n        'draft_json':json.dumps(draft,ensure_ascii=False),\n\
          \        'booking_type':draft.get('booking_types') or [],\n        'idempotency_key':draft.get('idempotency_key')\
          \ or ''\n    }"
