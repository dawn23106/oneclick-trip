app:
  description: 增加校验写入闸门、方案版本草稿失效、确认令牌、预订槽位守卫、工具白名单和恢复状态回写。
  icon: 🧭
  icon_background: '#E8F6F0'
  mode: advanced-chat
  name: 一键游 Multi-Agent 安全主骨架 v4
  use_icon_as_answer_icon: true
dependencies: []
kind: app
version: 0.4.0
workflow:
  conversation_variables:
  - description: 当前对话的轻量检查点；正式 LangGraph 由 MySQL CheckpointRepository 持久化。
    id: 1a7a1d8e-4c3e-4e48-bbf2-001001001001
    name: travel_checkpoint_json
    selector:
    - conversation
    - travel_checkpoint_json
    value: '{}'
    value_type: string
  - description: 当前结构化行程及版本，用于修改方案和预订引用。
    id: 2b8b2e9f-5d4f-4f59-cc03-002002002002
    name: current_plan_json
    selector:
    - conversation
    - current_plan_json
    value: '{}'
    value_type: string
  - description: 等待用户确认的订单草稿；绑定 conversation_id、计划和过期时间。
    id: 3c9c3fa0-6e50-406a-dd14-003003003003
    name: booking_draft_json
    selector:
    - conversation
    - booking_draft_json
    value: '{}'
    value_type: string
  - description: 会话状态乐观版本号。
    id: 4dad40b1-7f61-417b-ee25-004004004004
    name: checkpoint_version
    selector:
    - conversation
    - checkpoint_version
    value: 0
    value_type: number
  - description: 最近一次工具错误及恢复决策。
    id: 5ebe51c2-8072-428c-ff36-005005005005
    name: last_tool_errors_json
    selector:
    - conversation
    - last_tool_errors_json
    value: '[]'
    value_type: string
  environment_variables: []
  features:
    file_upload:
      enabled: false
    opening_statement: 一键游 v4 安全架构演示：校验失败不写入状态，新方案自动清除旧草稿；预订必须选择当前方案中的 option_id，并使用短时确认令牌。所有外部数据和提交仍为 Mock。
    retriever_resource:
      enabled: true
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions:
    - 从南京去成都玩三天，两个人，人均预算3000元，喜欢美食和拍照
    - 帮我查8月去杭州的天气、酒店和高铁，并做一份轻松行程
    - 我想预订上次方案中的酒店和熊猫基地门票
    - 查看我的旅行偏好，并记住我以后优先坐高铁
    suggested_questions_after_answer:
      enabled: true
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
