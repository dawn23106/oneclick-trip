    - data:
        code: "import json\n\nALLOWED = {'pace', 'budget_style', 'food', 'transport', 'hotel', 'activity', 'avoidance', 'tag'}\n\
          \ndef main(candidate_raw: str) -> dict:\n    raw = (candidate_raw or '').strip().replace('```json', '').replace('```',\
          \ '')\n    try:\n        data = json.loads(raw)\n    except Exception:\n        data = {'operations': []}\n    accepted\
          \ = []\n    rejected = []\n    for item in data.get('operations', []):\n        action = item.get('action')\n  \
          \      category = item.get('category')\n        confidence = float(item.get('confidence', 0) or 0)\n        evidence\
          \ = str(item.get('evidence', '')).strip()\n        sensitive = any(word in evidence for word in ['身份证', '银行卡', '密码',\
          \ '手机号', '支付'])\n        valid = action in {'upsert', 'delete'} and category in ALLOWED and evidence and not sensitive\n\
          \        if action == 'upsert':\n            valid = valid and confidence >= 0.85 and item.get('source') in {'explicit',\
          \ 'repeated'}\n        if valid:\n            accepted.append(item)\n        else:\n            rejected.append(item)\n\
          \    result = {'accepted': accepted, 'rejected': rejected, 'requires_user_confirmation': False}\n    return {\n\
          \        'accepted_count': len(accepted),\n        'memory_operations_json': json.dumps(result, ensure_ascii=False)\n\
          \    }"
        code_language: python3
        desc: 只允许明确或重复出现的稳定偏好进入长期记忆，并过滤敏感信息和一次性需求。
