          \ {'hotel_search'},\n        'transport_query': {'route', 'train_search', 'flight_search'},\n        'general_qa':\
          \ {'poi_rag'},\n        'trip_plan': {'weather', 'intercity_transport', 'hotel_area', 'poi_candidates'},\n     \
          \   'modify_plan': set()\n    }\n    defaults = {\n        'weather_query':['weather'], 'hotel_query':['hotel_search'],\n\
          \        'transport_query':['route','train_search','flight_search'],\n        'general_qa':['poi_rag'],\n      \
