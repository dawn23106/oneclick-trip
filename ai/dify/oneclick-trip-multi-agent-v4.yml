    - data:
        code: "import json\n\ndef main(query: str, intent_raw: str, memory_context: str, conversation_id: str, checkpoint_json:\
          \ str, current_plan_json: str, booking_draft_json: str, checkpoint_version: float) -> dict:\n    raw = (intent_raw\
          \ or '').strip().replace('```json', '').replace('```', '')\n    if '</think>' in raw:\n        raw = raw.split('</think>',\
          \ 1)[1].strip()\n    json_start, json_end = raw.find('{'), raw.rfind('}')\n    if json_start >= 0 and json_end >=\
          \ json_start:\n        raw = raw[json_start:json_end + 1]\n    try:\n        data = json.loads(raw)\n    except\
          \ Exception:\n        data = {'intent':'general_qa','confidence':0.0,'ready_for_execution':False,'missing_fields':['clarify_request']}\n\
          \n    # 对高确定性的产品指令做代码兜底，避免 LLM 偶发误分类导致调用错误工具。\n    # 复杂语义仍由意图 Agent 负责；这里只覆盖天气、预订等明显关键词。\n    text = (query or '').strip().lower()\n\
          \    deterministic_intent = None\n    if any(word in text for word in ['确认提交', '确认下单', '确认预订', '确认购买']):\n     \
          \   deterministic_intent = 'booking_confirm'\n    elif any(word in text for word in ['预订', '购买', '下单', '订酒店', '订票']):\n\
          \        deterministic_intent = 'booking'\n    elif any(word in text for word in ['记住', '忘掉', '忘记我的', '旅行偏好', '旅游偏好',\
          \ '旅行习惯']):\n        deterministic_intent = 'memory_manage'\n    elif any(word in text for word in ['修改行程', '调整行程',\
          \ '换成', '改成', '把第']) and any(word in text for word in ['行程', '第', '上午', '下午', '晚上']):\n        deterministic_intent\
          \ = 'modify_plan'\n    elif any(word in text for word in ['规划', '攻略', '行程', '安排']) or ('玩' in text and any(word\
          \ in text for word in ['天', '周末'])):\n        deterministic_intent = 'trip_plan'\n    elif any(word in text for\
          \ word in ['天气', '下雨', '温度', '气温']):\n        deterministic_intent = 'weather_query'\n    elif any(word in text\
          \ for word in ['酒店', '住宿', '住哪里']):\n        deterministic_intent = 'hotel_query'\n    elif any(word in text for\
          \ word in ['高铁', '火车', '飞机', '机票', '交通怎么走']):\n        deterministic_intent = 'transport_query'\n\n    if deterministic_intent:\n\
          \        data['intent'] = deterministic_intent\n        data['confidence'] = max(float(data.get('confidence', 0)\
          \ or 0), 0.99)\n        tool_defaults = {\n            'weather_query':['weather'],\n            'hotel_query':['hotel_search'],\n\
          \            'transport_query':['route','train_search','flight_search'],\n            'trip_plan':['weather','intercity_transport','hotel_area','poi_candidates']\n\
          \        }\n        if deterministic_intent in tool_defaults:\n            data['requested_tools'] = tool_defaults[deterministic_intent]\n\
          \        data['ready_for_execution'] = deterministic_intent not in {'trip_plan', 'booking', 'booking_confirm', 'modify_plan'}\n\
          \        data['missing_fields'] = []\n\n    def ensure_list(value):\n        if value is None:\n            return\
          \ []\n        return value if isinstance(value, list) else [value]\n    entities = dict(data.get('entities') or\
          \ {})\n    if entities.get('budget') is not None:\n        if not entities.get('budget_scope'):\n            entities['budget_scope']\
          \ = 'per_person' if any(word in text for word in ['人均', '每人']) else 'total'\n        entities['currency'] = entities.get('currency')\
          \ or 'CNY'\n    state = {\n        'query': query,\n        'intent': data.get('intent', 'general_qa'),\n      \
          \  'confidence': float(data.get('confidence', 0) or 0),\n        'ready_for_execution': bool(data.get('ready_for_execution',\
          \ False)),\n        'missing_fields': ensure_list(data.get('missing_fields')),\n        'entities': entities,\n\
          \        'preference_tags': ensure_list(data.get('preference_tags')),\n        'requested_tools': ensure_list(data.get('requested_tools')),\n\
          \        'booking_type': ensure_list(data.get('booking_type')),\n        'selected_option_ids': ensure_list(data.get('selected_option_ids')),\n\
          \        'current_plan_id': data.get('current_plan_id'),\n        'current_plan': None,\n        'plan_version':\
          \ None,\n        'quote_ids': [],\n        'tool_results': {},\n        'tool_errors': [],\n        'validation_errors':\
          \ [],\n        'revision_count': 0,\n        'booking_draft': None,\n        'memory_context': memory_context,\n\
          \        'memory_write_status': 'PENDING'\n    }\n\n    try: persisted_plan = json.loads(current_plan_json or '{}')\n\
          \    except Exception: persisted_plan = {}\n    try: persisted_draft = json.loads(booking_draft_json or '{}')\n\
          \    except Exception: persisted_draft = {}\n    state['thread_id'] = conversation_id\n    state['checkpoint_version']\
          \ = int(checkpoint_version or 0)\n    state['checkpoint_json'] = checkpoint_json or '{}'\n    state['current_plan_json']\
          \ = current_plan_json or '{}'\n    state['booking_draft_json'] = booking_draft_json or '{}'\n    if persisted_plan:\n\
          \        state['current_plan_id'] = persisted_plan.get('plan_id') or state.get('current_plan_id')\n        state['plan_version']\
          \ = persisted_plan.get('plan_version')\n    if persisted_draft:\n        state['booking_draft_id'] = persisted_draft.get('draft_id')\n\
          \        state['booking_draft_status'] = persisted_draft.get('status')\n        state['quote_ids'] = persisted_draft.get('quote_ids')\
          \ or state.get('quote_ids') or []\n    return {'intent':state['intent'], 'ready':'true' if state['ready_for_execution']\
          \ else 'false', 'state':state, 'state_json':json.dumps(state,ensure_ascii=False)}"
        code_language: python3
