app:
  description: 纯 Mock 演示模式：按意图精确分流、两阶段研究、结构化状态、预订草稿、代码硬校验与 LLM 软评审。
  icon: 🧭
  icon_background: '#E8F6F0'
  mode: advanced-chat
  name: 一键游 Multi-Agent 演示原型 v2
  use_icon_as_answer_icon: true
dependencies: []
kind: app
version: 0.3.0
workflow:
  conversation_variables: []
  environment_variables: []
  features:
    file_upload:
      enabled: false
    opening_statement: 当前为一键游 Multi-Agent 架构演示，天气、酒店、交通、景点、门票和预订均使用结构化 Mock 数据，不会产生真实查询、扣款或订单。
    retriever_resource:
      enabled: true
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions:
    - 从南京去成都玩三天，两个人，人均预算3000元，喜欢美食和拍照
    - 帮我查8月去杭州的天气、酒店和高铁，并做一份轻松行程
    - 我想预订上次方案中的酒店和熊猫基地门票
    - 查看我的旅行偏好，并记住我以后优先坐高铁
    suggested_questions_after_answer:
      enabled: true
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
