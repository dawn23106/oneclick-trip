    nodes:
    - data:
        desc: 用户自然语言入口，对应 LangGraph START。
        selected: false
        title: 开始 / 用户输入
        type: start
        variables: []
      height: 90
      id: start
      position:
        x: 40
        y: 680
      positionAbsolute:
        x: 40
        y: 680
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 260
    - data:
        code: "import json\n\ndef main(query: str, conversation_id: str) -> dict:\n    # Dify 的真实短期记忆由各 LLM 节点的 memory.window\
          \ 管理。\n    # 本节点把会话边界显式写入状态，便于后续迁移到 LangGraph checkpointer。\n    payload = {\n        'scope': 'conversation',\n\
          \        'conversation_id': conversation_id or 'CURRENT_CONVERSATION',\n        'window_size': 20,\n        'current_query':\
          \ query,\n        'summary': '',\n        'backend': 'DIFY_MESSAGE_WINDOW',\n        'expires_when': 'conversation_closed_or_ttl'\n\
          \    }\n    return {'short_memory_json': json.dumps(payload, ensure_ascii=False)}"
        code_language: python3
        desc: 单个聊天窗口内的短期记忆边界。Dify 使用最近 20 轮消息，LangGraph 对应 checkpointer + thread_id。
        outputs:
          short_memory_json:
            children: null
            type: string
        selected: false
        title: 记忆 1 - 会话短期记忆
        type: code
        variables:
        - value_selector:
          - sys
          - query
          variable: query
        - value_selector:
          - sys
          - conversation_id
          variable: conversation_id
      height: 110
      id: short_memory_loader
      position:
        x: 360
        y: 680
      positionAbsolute:
        x: 360
        y: 680
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 280
    - data:
        code: "import json\n\ndef main(user_id: str) -> dict:\n    # 原型只声明接口，不连接真实数据库。\n    # FastAPI/LangGraph 实现时调用 GET\
          \ /tools/memory/profile/{user_id}。\n    profile = {\n        'user_id': user_id or 'ANONYMOUS',\n        'stable_tags':\
          \ [],\n        'pace_preference': None,\n        'budget_style': None,\n        'food_preferences': [],\n      \
          \  'transport_preferences': [],\n        'hotel_preferences': [],\n        'activity_preferences': [],\n       \
          \ 'avoidances': [],\n        'confidence': {},\n        'updated_at': None\n    }\n    return {\n        'profile_json':\
          \ json.dumps(profile, ensure_ascii=False),\n        'read_status': 'INTERFACE_ONLY',\n        'endpoint': 'GET /tools/memory/profile/{user_id}'\n\
          \    }"
        code_language: python3
        desc: 跨会话读取用户的稳定旅游习惯；真实数据由 MySQL 用户画像表提供。
        outputs:
          endpoint:
            children: null
            type: string
          profile_json:
            children: null
            type: string
          read_status:
            children: null
            type: string
        selected: false
        title: 记忆 2 - 长期旅游画像读取
        type: code
        variables:
        - value_selector:
          - sys
          - user_id
          variable: user_id
      height: 110
      id: long_memory_reader
      position:
        x: 700
        y: 680
      positionAbsolute:
        x: 700
        y: 680
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 280
    - data:
        code: "import json\n\ndef main(short_memory_json: str, profile_json: str) -> dict:\n    try:\n        short_memory\
          \ = json.loads(short_memory_json or '{}')\n    except Exception:\n        short_memory = {}\n    try:\n        profile\
          \ = json.loads(profile_json or '{}')\n    except Exception:\n        profile = {}\n    context = {\n        'short_term':\
          \ short_memory,\n        'long_term_profile': profile,\n        'rules': {\n            'current_explicit_request_overrides_memory':\
          \ True,\n            'never_infer_sensitive_attributes': True,\n            'long_term_requires_explicit_or_repeated_signal':\
          \ True\n        }\n    }\n    return {'memory_context': json.dumps(context, ensure_ascii=False)}"
        code_language: python3
        desc: 合并短期上下文和长期画像。当前用户明确表达始终高于历史偏好。
        outputs:
          memory_context:
            children: null
            type: string
        selected: false
        title: 记忆 3 - 上下文合并
        type: code
        variables:
        - value_selector:
          - short_memory_loader
          - short_memory_json
          variable: short_memory_json
        - value_selector:
          - long_memory_reader
          - profile_json
          variable: profile_json
      height: 110
      id: memory_context_builder
      position:
        x: 1040
        y: 680
      positionAbsolute:
        x: 1040
        y: 680
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 280
    - data:
        context:
          enabled: false
          variable_selector: []
        desc: 结合短期对话和长期旅游画像，识别意图、槽位、缺失信息与用户标签。
        memory:
          query_prompt_template: '{{#sys.query#}}'
          role_prefix:
            assistant: ''
            user: ''
          window:
            enabled: true
            size: 20
        model:
          completion_params:
            temperature: 0.1
          mode: chat
          name: deepseek-v4-pro
          provider: langgenius/deepseek/deepseek
        prompt_template:
        - id: intent-system
          role: system
          text: '你是“一键游”的意图识别与槽位抽取 Agent，只输出 JSON。

            intent 只能是 trip_plan、modify_plan、weather_query、hotel_query、transport_query、general_qa、booking、booking_confirm、memory_manage。

            输出 intent、confidence、ready_for_execution、missing_fields、entities、preference_tags、requested_tools、booking_type、selected_option_ids、current_plan_id。

            按意图判断必填字段，但不要用完整行程条件阻塞单项查询。weather_query 没有显式城市时允许使用设备当前定位；general_qa 直接就绪；trip_plan 才要求目的地、日期/天数、人数和预算；modify_plan
            需要 current_plan_id 或当前会话方案；booking 需要 booking_type 和选项；booking_confirm 必须有订单草稿或 quote_id。

            当前明确要求优先于历史记忆。记忆上下文：{{#memory_context_builder.memory_context#}}'
        - id: intent-user
          role: user
          text: '{{#sys.query#}}'
        selected: false
        title: Agent 1 - 意图识别与槽位抽取
        type: llm
        variables: []
        vision:
          enabled: false
      height: 120
      id: intent_agent
      position:
        x: 1380
        y: 680
      positionAbsolute:
        x: 1380
        y: 680
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 280
    - data:
        code: "import json\n\ndef main(query: str, intent_raw: str, memory_context: str) -> dict:\n    raw = (intent_raw or\
          \ '').strip().replace('```json', '').replace('```', '')\n    if '</think>' in raw:\n        raw = raw.split('</think>',\
          \ 1)[1].strip()\n    json_start, json_end = raw.find('{'), raw.rfind('}')\n    if json_start >= 0 and json_end >=\
          \ json_start:\n        raw = raw[json_start:json_end + 1]\n    try:\n        data = json.loads(raw)\n    except\
          \ Exception:\n        data = {'intent':'general_qa','confidence':0.0,'ready_for_execution':False,'missing_fields':['clarify_request']}\n\
          \n    # 对高确定性的产品指令做代码兜底，避免 LLM 偶发误分类导致调用错误工具。\n    # 复杂语义仍由意图 Agent 负责；这里只覆盖天气、预订等明显关键词。\n    text = (query or '').strip().lower()\n\
          \    deterministic_intent = None\n    if any(word in text for word in ['确认提交', '确认下单', '确认预订', '确认购买']):\n     \
          \   deterministic_intent = 'booking_confirm'\n    elif any(word in text for word in ['预订', '购买', '下单', '订酒店', '订票']):\n\
          \        deterministic_intent = 'booking'\n    elif any(word in text for word in ['记住', '忘掉', '忘记我的', '旅行偏好', '旅游偏好',\
          \ '旅行习惯']):\n        deterministic_intent = 'memory_manage'\n    elif any(word in text for word in ['修改行程', '调整行程',\
          \ '换成', '改成', '把第']) and any(word in text for word in ['行程', '第', '上午', '下午', '晚上']):\n        deterministic_intent\
          \ = 'modify_plan'\n    elif any(word in text for word in ['规划', '攻略', '行程', '安排']) or ('玩' in text and any(word\
          \ in text for word in ['天', '周末'])):\n        deterministic_intent = 'trip_plan'\n    elif any(word in text for\
          \ word in ['天气', '下雨', '温度', '气温']):\n        deterministic_intent = 'weather_query'\n    elif any(word in text\
          \ for word in ['酒店', '住宿', '住哪里']):\n        deterministic_intent = 'hotel_query'\n    elif any(word in text for\
          \ word in ['高铁', '火车', '飞机', '机票', '交通怎么走']):\n        deterministic_intent = 'transport_query'\n\n    if deterministic_intent:\n\
          \        data['intent'] = deterministic_intent\n        data['confidence'] = max(float(data.get('confidence', 0)\
          \ or 0), 0.99)\n        tool_defaults = {\n            'weather_query':['weather'],\n            'hotel_query':['hotel_search'],\n\
          \            'transport_query':['route','train_search','flight_search'],\n            'trip_plan':['weather','intercity_transport','hotel_area','poi_candidates']\n\
          \        }\n        if deterministic_intent in tool_defaults:\n            data['requested_tools'] = tool_defaults[deterministic_intent]\n\
          \        data['ready_for_execution'] = deterministic_intent not in {'trip_plan', 'booking', 'booking_confirm', 'modify_plan'}\n\
          \        data['missing_fields'] = []\n\n    def ensure_list(value):\n        if value is None:\n            return\
          \ []\n        return value if isinstance(value, list) else [value]\n    state = {\n        'query': query,\n   \
          \     'intent': data.get('intent', 'general_qa'),\n        'confidence': float(data.get('confidence', 0) or 0),\n\
          \        'ready_for_execution': bool(data.get('ready_for_execution', False)),\n        'missing_fields': ensure_list(data.get('missing_fields')),\n\
          \        'entities': data.get('entities', {}),\n        'preference_tags': ensure_list(data.get('preference_tags')),\n\
          \        'requested_tools': ensure_list(data.get('requested_tools')),\n        'booking_type': ensure_list(data.get('booking_type')),\n\
